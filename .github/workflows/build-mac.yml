name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - mvp
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app and DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build:all

      - name: Build DMG
        run: npm run build:dmg

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Darktime-Calendar-Bridge-mac
          path: |
            dist/mac/Darktime Calendar Bridge.app
            dist/mac/Darktime-Calendar-Bridge-mac.zip
            dist/mac/Darktime-Calendar-Bridge-mac.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "dist/mac/Darktime-Calendar-Bridge-mac.dmg" \
              "dist/mac/Darktime-Calendar-Bridge-mac.zip" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              "dist/mac/Darktime-Calendar-Bridge-mac.dmg" \
              "dist/mac/Darktime-Calendar-Bridge-mac.zip" \
              --title "$TAG_NAME" \
              --generate-notes
          fi
